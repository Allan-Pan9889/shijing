<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>诗径 · 打点校准器</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{
    --paper:#f4efe4; --ink:#2c2a26; --sub:#6b6557;
    --line:#c9bfa8; --accent:#7a6a4f; --good:#4a7c59; --warn:#b06a4a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;font-family:-apple-system,"PingFang SC","Songti SC",serif;
    background:var(--paper);color:var(--ink);overflow:hidden;}
  #map{position:absolute;top:0;left:0;right:0;height:42%;background:#e9e2d2;}
  .leaflet-tile-pane{filter:sepia(.22) saturate(.85) brightness(1.03) contrast(.97);}
  .leaflet-container{background:#e9e2d2;font-family:inherit;}
  .leaflet-control-attribution{font-size:9px;background:rgba(244,239,228,.7);}

  #panel{position:absolute;top:42%;left:0;right:0;bottom:0;overflow-y:auto;
    padding:14px 16px 28px;background:var(--paper);
    box-shadow:0 -6px 20px rgba(0,0,0,.08);border-top:1px solid var(--line);}
  h1{font-size:17px;margin:0 0 2px;letter-spacing:2px;}
  h1 small{font-size:11px;color:var(--sub);letter-spacing:1px;margin-left:8px;font-weight:400;}
  .hint{font-size:11.5px;color:var(--sub);line-height:1.6;margin:6px 0 12px;}

  .stat{display:grid;grid-template-columns:auto 1fr;gap:4px 12px;font-size:13px;
    background:#fbf8f0;border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:12px;}
  .stat .k{color:var(--sub);font-size:11.5px;align-self:center;}
  .stat .v{font-variant-numeric:tabular-nums;font-size:14px;letter-spacing:.3px;}
  .v.coord{font-size:15px;font-weight:600;}
  .acc-pill{display:inline-block;padding:1px 9px;border-radius:20px;font-size:11px;color:#fff;}
  .acc-good{background:var(--good);} .acc-mid{background:#b8954a;} .acc-bad{background:var(--warn);}

  .samples{font-size:11px;color:var(--sub);margin:-4px 0 12px;text-align:center;}

  .btns{display:flex;gap:10px;margin-bottom:8px;}
  button{flex:1;font-family:inherit;font-size:14px;padding:13px 8px;border-radius:10px;
    border:1px solid var(--accent);background:var(--accent);color:#fff;letter-spacing:1px;
    transition:.15s;cursor:pointer;}
  button.ghost{background:transparent;color:var(--accent);}
  button:active{transform:scale(.97);}
  button:disabled{opacity:.4;}

  .field{margin:12px 0 6px;}
  .field label{font-size:11.5px;color:var(--sub);display:block;margin-bottom:4px;}
  .field input{width:100%;font-family:inherit;font-size:14px;padding:9px 11px;
    border:1px solid var(--line);border-radius:8px;background:#fbf8f0;color:var(--ink);}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

  .out{margin-top:14px;}
  .out label{font-size:11.5px;color:var(--sub);display:block;margin-bottom:5px;}
  textarea{width:100%;height:148px;font-family:ui-monospace,Menlo,monospace;font-size:11.5px;
    line-height:1.5;padding:11px;border:1px solid var(--line);border-radius:8px;
    background:#fbf8f0;color:var(--ink);resize:vertical;}

  .near{font-size:11.5px;color:var(--sub);margin:10px 0 0;line-height:1.7;}
  .near b{color:var(--ink);font-weight:600;}
  .near .far{color:var(--warn);}

  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);
    background:var(--ink);color:#fff;font-size:13px;padding:10px 20px;border-radius:24px;
    opacity:0;transition:.3s;pointer-events:none;z-index:9999;}
  .toast.show{opacity:.94;}

  .pin-pulse{width:18px;height:18px;border-radius:50%;background:var(--warn);
    border:3px solid #fff;box-shadow:0 0 0 2px var(--warn);}
</style>
</head>
<body>
<div id="map"></div>
<div id="panel">
  <h1>打点校准器<small>诗径 · 实地实测</small></h1>
  <div class="hint">
    带手机到点位站定，等精度圈收敛(建议 ≤10m)再「定点」。坐标为 WGS-84，可直接填进 poems.json。
    林间信号差时静止 20–30 秒等读数稳定。
  </div>

  <div class="stat">
    <div class="k">实时坐标</div><div class="v coord" id="liveCoord">—</div>
    <div class="k">定位精度</div><div class="v" id="liveAcc">—</div>
    <div class="k">已采样</div><div class="v" id="sampleN">0 次</div>
    <div class="k">定点结果</div><div class="v coord" id="fixCoord" style="color:var(--good)">未定点</div>
  </div>

  <div class="btns">
    <button id="btnStart">▶ 开始定位</button>
    <button id="btnFix" class="ghost" disabled>📍 定点(取中位数)</button>
  </div>
  <div class="samples" id="sampleInfo">点「开始定位」授权 GPS。建议站定后采集 8–15 个样本再定点。</div>

  <div class="field">
    <label>点位 id（如 p5 / g7）</label>
    <input id="inId" placeholder="p5" />
  </div>
  <div class="field">
    <label>名称</label>
    <input id="inName" placeholder="例：神运石" />
  </div>
  <div class="row2">
    <div class="field">
      <label>触发半径 (m)</label>
      <input id="inRadius" type="number" value="50" />
    </div>
    <div class="field">
      <label>现场已走通？</label>
      <input id="inVerified" value="true" />
    </div>
  </div>

  <div class="near" id="nearInfo"></div>

  <div class="out">
    <label>生成的 JSON 片段（点下方按钮复制）</label>
    <textarea id="outJson" readonly placeholder="定点后自动生成…"></textarea>
    <div class="btns" style="margin-top:10px;">
      <button id="btnCopy">⧉ 复制 JSON</button>
      <button id="btnDownload" class="ghost">⤓ 存为文件</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ---- 已知点位（来自 poems.json / trail-gushan.json，WGS-84），用于现场比对 ----
const KNOWN = [
  {id:'p1', name:'风篁岭',     lat:30.22493, lng:120.10892, src:'estimate'},
  {id:'p2', name:'过溪亭',     lat:30.22472, lng:120.10832, src:'estimate'},
  {id:'p3', name:'方圆庵',     lat:30.22450, lng:120.10772, src:'osm'},
  {id:'p4', name:'老龙井',     lat:30.22393, lng:120.10683, src:'osm'},
];

// ---- 地图 ----
const map = L.map('map',{zoomControl:true,attributionControl:true}).setView([30.2245,120.1078],17);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png',
  {maxZoom:19,subdomains:'abcd',attribution:'© OpenStreetMap © CARTO'}).addTo(map);

// 已知点标记
KNOWN.forEach(p=>{
  const color = p.src==='osm' ? '#4a7c59' : '#b06a4a';
  L.circleMarker([p.lat,p.lng],{radius:6,color:'#fff',weight:2,fillColor:color,fillOpacity:.95})
    .addTo(map).bindTooltip(`${p.id} ${p.name}${p.src==='osm'?' ✓已证':' ⚠估算'}`,{direction:'top'});
});

// 实时位置标记 + 精度圈
let liveMarker=null, accCircle=null, fixMarker=null;
function setLive(lat,lng,acc){
  if(!liveMarker){
    liveMarker=L.marker([lat,lng],{icon:L.divIcon({className:'',html:'<div class="pin-pulse"></div>',iconSize:[18,18],iconAnchor:[9,9]})}).addTo(map);
    accCircle=L.circle([lat,lng],{radius:acc,color:'#b06a4a',weight:1,fillColor:'#b06a4a',fillOpacity:.12}).addTo(map);
  }else{
    liveMarker.setLatLng([lat,lng]); accCircle.setLatLng([lat,lng]); accCircle.setRadius(acc);
  }
  map.setView([lat,lng], Math.max(map.getZoom(),18));
}

// ---- GPS 采样 ----
let watchId=null, samples=[];
const $=id=>document.getElementById(id);
function fmt(n){return n.toFixed(6);}
function hav(a,b,c,d){const R=6371000,r=Math.PI/180;
  const dp=(c-a)*r,dl=(d-b)*r;
  const x=Math.sin(dp/2)**2+Math.cos(a*r)*Math.cos(c*r)*Math.sin(dl/2)**2;
  return 2*R*Math.asin(Math.sqrt(x));}

function accPill(acc){
  let cls='acc-bad',txt='差';
  if(acc<=10){cls='acc-good';txt='好';} else if(acc<=25){cls='acc-mid';txt='中';}
  return `<span class="acc-pill ${cls}">${acc.toFixed(0)}m ${txt}</span>`;
}

$('btnStart').onclick=()=>{
  if(!('geolocation' in navigator)){toast('此设备不支持定位');return;}
  if(watchId!==null){ // 停止
    navigator.geolocation.clearWatch(watchId); watchId=null;
    $('btnStart').textContent='▶ 开始定位'; return;
  }
  samples=[]; $('sampleN').textContent='0 次';
  $('btnStart').textContent='⏸ 停止定位';
  watchId=navigator.geolocation.watchPosition(pos=>{
    const {latitude:lat,longitude:lng,accuracy:acc}=pos.coords;
    samples.push({lat,lng,acc,t:Date.now()});
    if(samples.length>40) samples.shift();
    $('liveCoord').textContent=`${fmt(lat)}, ${fmt(lng)}`;
    $('liveAcc').innerHTML=accPill(acc);
    $('sampleN').textContent=samples.length+' 次';
    setLive(lat,lng,acc);
    updateNear(lat,lng);
    $('btnFix').disabled = samples.length<3;
    const good=samples.filter(s=>s.acc<=15).length;
    $('sampleInfo').textContent = acc<=10
      ? `精度良好(${acc.toFixed(0)}m)，已采 ${samples.length} 个；可定点。`
      : `精度 ${acc.toFixed(0)}m 偏大，建议静止等待收敛（已采 ${samples.length}，其中 ${good} 个≤15m）。`;
  }, err=>{
    toast('定位失败：'+err.message);
    $('btnStart').textContent='▶ 开始定位'; watchId=null;
  }, {enableHighAccuracy:true,maximumAge:0,timeout:15000});
};

// 取最近若干个高精度样本的中位数（抗漂移）
function median(arr){const s=[...arr].sort((a,b)=>a-b);const m=s.length>>1;
  return s.length%2?s[m]:(s[m-1]+s[m])/2;}

$('btnFix').onclick=()=>{
  if(samples.length<3){toast('样本太少');return;}
  // 优先用精度≤15m的样本；不足则用全部里精度最好的一半
  let use=samples.filter(s=>s.acc<=15);
  if(use.length<3){ use=[...samples].sort((a,b)=>a.acc-b.acc).slice(0,Math.max(3,samples.length>>1)); }
  const flat=median(use.map(s=>s.lat)), flng=median(use.map(s=>s.lng));
  const bestAcc=Math.min(...use.map(s=>s.acc));
  fixMarker && map.removeLayer(fixMarker);
  fixMarker=L.circleMarker([flat,flng],{radius:8,color:'#fff',weight:3,fillColor:'#4a7c59',fillOpacity:1})
    .addTo(map).bindTooltip('定点结果',{permanent:false,direction:'top'});
  $('fixCoord').textContent=`${fmt(flat)}, ${fmt(flng)}`;
  $('fixCoord').dataset.lat=flat; $('fixCoord').dataset.lng=flng; $('fixCoord').dataset.acc=bestAcc.toFixed(0);
  buildJson(flat,flng,bestAcc);
  updateNear(flat,flng);
  toast(`已定点（取 ${use.length} 样本中位数，精度~${bestAcc.toFixed(0)}m）`);
};

function buildJson(lat,lng,acc){
  const id=$('inId').value.trim()||'pX';
  const name=$('inName').value.trim()||'(待填名称)';
  const radius=parseInt($('inRadius').value)||50;
  const verified=/^(true|是|y|yes|1)$/i.test($('inVerified').value.trim());
  const obj={
    id, name,
    lat:+lat.toFixed(6), lng:+lng.toFixed(6),
    coord_system:"WGS-84",
    coord_source:"field-"+new Date().toISOString().slice(0,7),
    coord_accuracy_m:+acc.toFixed(0),
    radius,
    radius_verified:verified
  };
  $('outJson').value=JSON.stringify(obj,null,2);
}
// 输入框变动时实时重建
['inId','inName','inRadius','inVerified'].forEach(id=>{
  $(id).addEventListener('input',()=>{
    const f=$('fixCoord'); if(f.dataset.lat) buildJson(+f.dataset.lat,+f.dataset.lng,+f.dataset.acc);
  });
});

function updateNear(lat,lng){
  const arr=KNOWN.map(p=>({...p,d:hav(lat,lng,p.lat,p.lng)})).sort((a,b)=>a.d-b.d);
  const top=arr.slice(0,3).map(p=>{
    const cls=p.d>120?'far':'';
    return `<span class="${cls}"><b>${p.id} ${p.name}</b> ${p.d.toFixed(0)}m</span>`;
  }).join(' · ');
  $('nearInfo').innerHTML='距已知点：'+top;
}

$('btnCopy').onclick=async()=>{
  const t=$('outJson').value; if(!t){toast('先定点');return;}
  try{ await navigator.clipboard.writeText(t); toast('已复制到剪贴板'); }
  catch(e){ $('outJson').select(); document.execCommand('copy'); toast('已复制'); }
};
$('btnDownload').onclick=()=>{
  const t=$('outJson').value; if(!t){toast('先定点');return;}
  const id=$('inId').value.trim()||'point';
  const blob=new Blob([t],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=`${id}.json`; a.click();
  toast('已下载 '+id+'.json');
};

let toastT=null;
function toast(m){const el=$('toast');el.textContent=m;el.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2200);}
</script>
</body>
</html>

// ════════════════ NarrationStage lib (verbatim from skill) ════════════════
const NarrationStageLib = (() => {
  const NarrationContext = React.createContext({});
  function NarrationStage({ timeline, audioSrc, width = 1920, height = 1080, background = '#0e0e0e', controls = true, children }) {
    const audioRef = React.useRef(null);
    const [time, setTime] = React.useState(0);
    const [playing, setPlaying] = React.useState(false);
    const recording = typeof window !== 'undefined' && window.__recording === true;
    React.useEffect(() => { if (typeof window !== 'undefined') { window.__totalDuration = timeline.totalDuration; window.__ready = true; } }, [timeline.totalDuration]);
    React.useEffect(() => {
      let raf;
      if (recording) {
        let startedAt = null;
        const tick = (now) => {
          if (startedAt === null) startedAt = now;
          setTime(Math.min((now - startedAt) / 1000, timeline.totalDuration));
          raf = requestAnimationFrame(tick);
        };
        raf = requestAnimationFrame(tick);
        if (typeof window !== 'undefined') window.__seek = (t) => { startedAt = performance.now() - t * 1000; setTime(t); };
      } else {
        const tick = () => {
          if (audioRef.current && !audioRef.current.paused) setTime(audioRef.current.currentTime);
          raf = requestAnimationFrame(tick);
        };
        tick();
      }
      return () => cancelAnimationFrame(raf);
    }, [recording, timeline.totalDuration]);
    const currentScene = React.useMemo(() => {
      if (!timeline.scenes) return null;
      for (let i = 0; i < timeline.scenes.length; i++) {
        const s = timeline.scenes[i]; const next = timeline.scenes[i + 1];
        if (time >= s.start && (!next || time < next.start)) return s;
      }
      return timeline.scenes[0];
    }, [time, timeline.scenes]);
    const sceneTime = currentScene ? Math.max(0, time - currentScene.start) : 0;
    const allCues = React.useMemo(() => { const m = {}; for (const s of timeline.scenes || []) for (const c of s.cues || []) m[c.id] = c; return m; }, [timeline.scenes]);
    const isCueTriggered = React.useCallback(id => { const c = allCues[id]; return c ? time >= c.absoluteTime : false; }, [allCues, time]);
    const cueProgress = React.useCallback((id, ramp = 0.6) => { const c = allCues[id]; if (!c) return 0; const dt = time - c.absoluteTime; if (dt <= 0) return 0; if (dt >= ramp) return 1; return dt / ramp; }, [allCues, time]);
    const ctx = { time, scene: currentScene, sceneTime, isCueTriggered, cueProgress, timeline };
    return (
      <NarrationContext.Provider value={ctx}>
        <div style={{ position: 'relative', width, height, background, overflow: 'hidden', color: '#2c2620' }}>{children}</div>
        {!recording && <audio ref={audioRef} src={audioSrc} preload="auto" onEnded={() => setPlaying(false)} />}
        {!recording && controls && (
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '12px 16px', background: '#1a1a1a', color: '#ddd', fontFamily: 'monospace', fontSize: 13, width, boxSizing: 'border-box' }}>
            <button onClick={() => { if (audioRef.current.paused) { audioRef.current.play(); setPlaying(true); } else { audioRef.current.pause(); setPlaying(false); } }} style={{ padding: '6px 14px', background: '#fff', color: '#000', border: 0, borderRadius: 4, cursor: 'pointer', fontWeight: 600 }}>{playing ? '❚❚ Pause' : '▶ Play'}</button>
            <input type="range" min={0} max={timeline.totalDuration} step={0.01} value={time} onChange={e => { const t = parseFloat(e.target.value); audioRef.current.currentTime = t; setTime(t); }} style={{ flex: 1 }} />
            <span style={{ minWidth: 130, textAlign: 'right' }}>{time.toFixed(2)} / {timeline.totalDuration.toFixed(2)}s</span>
            <span style={{ padding: '4px 10px', background: '#2a2a2a', borderRadius: 4, minWidth: 120, textAlign: 'center' }}>{currentScene ? currentScene.id : '—'}</span>
          </div>
        )}
      </NarrationContext.Provider>
    );
  }
  function useNarration() { return React.useContext(NarrationContext); }
  function useSceneFade(sceneId, fadeIn = 0.5, fadeOut = 0.5) {
    const { time, timeline } = React.useContext(NarrationContext);
    if (!timeline) return 0;
    const s = timeline.scenes.find(x => x.id === sceneId);
    if (!s) return 0;
    const inT = (time - s.start) / fadeIn;
    const outT = (s.end - time) / fadeOut;
    return Math.max(0, Math.min(1, Math.min(inT, outT)));
  }
  function Cue({ id, ramp = 0.6, children }) {
    const { isCueTriggered, cueProgress } = React.useContext(NarrationContext);
    return children(isCueTriggered(id), cueProgress(id, ramp));
  }
  return { NarrationStage, Cue, useNarration, useSceneFade };
})();
const { NarrationStage, Cue, useNarration, useSceneFade } = NarrationStageLib;

// 行者从东(断桥)一路西行，走过 1400 年。已走过的堤身描朱砂，涟漪持续扩散。
const DIKE_Y = 700;
const STATIONS = {
  kaichang: { x: 6 },
  duanqiao: { x: 13, place: '断桥', year: '823', era: '唐' },
  baidi:    { x: 30, place: '白堤', year: '823', era: '唐' },
  pinghu:   { x: 45, place: '孤山寺', year: '823', era: '唐' },
  fanghe:   { x: 62, place: '放鹤亭', year: '1020', era: '北宋' },
  xiling:   { x: 80, place: '西泠桥', year: '490', era: '南朝齐' },
  qiujin:   { x: 90, place: '秋瑾墓', year: '1907', era: '清' },
  shouwei:  { x: 90 },
};
const SCENE_ORDER = ['kaichang','duanqiao','baidi','pinghu','fanghe','xiling','qiujin','shouwei'];
const MARKERS = ['duanqiao','baidi','pinghu','fanghe','xiling','qiujin'];

const HeroDike = () => {
  const { time, scene } = useNarration();
  if (!scene) return null;
  const idx = SCENE_ORDER.indexOf(scene.id);
  const prevId = idx > 0 ? SCENE_ORDER[idx - 1] : scene.id;
  const from = STATIONS[prevId].x, to = STATIONS[scene.id].x;
  const transitionDur = Math.min(2.4, scene.duration * 0.55);
  const t = expoOut(Math.min(1, Math.max(0, (time - scene.start) / transitionDur)));
  const walkerXpct = lerp(from, to, t);
  const walkerPx = walkerXpct / 100 * 1920;
  const bob = Math.sin(time * 1.2) * 1.2; // 行走起伏（降幅降频，避免逐帧抖动）
  const wy = DIKE_Y + bob;

  // 涟漪：连续平滑扩散，用 sin 包络淡入淡出，避免 %取模 的硬跳回造成闪帧
  const RIP = 3.6; // 单次涟漪周期(秒)
  const ph1 = (time % RIP) / RIP;        // 0→1
  const ph2 = ((time + RIP / 2) % RIP) / RIP;
  const r1 = ph1 * 70;
  const r2 = ph2 * 70;
  const rop1 = 0.4 * Math.sin(ph1 * Math.PI); // 两端淡入淡出，循环点 opacity=0 无跳变
  const rop2 = 0.4 * Math.sin(ph2 * Math.PI);

  return (
    <svg width="1920" height="1080" style={{ position: 'absolute', inset: 0, pointerEvents: 'none' }}>
      {/* 堤身 — 未走过部分：淡墨 */}
      <path d="M 80 700 Q 520 684 960 700 T 1840 700" fill="none" stroke={C.ink} strokeOpacity="0.16" strokeWidth="2.5" strokeLinecap="round" />
      {/* 已走过 — 朱砂描红，用 clip 随行者生长 */}
      <defs>
        <clipPath id="trav"><rect x="0" y="640" width={walkerPx} height="120" /></clipPath>
      </defs>
      <path d="M 80 700 Q 520 684 960 700 T 1840 700" fill="none" stroke={C.seal} strokeOpacity="0.5" strokeWidth="3" strokeLinecap="round" clipPath="url(#trav)" />
      {/* 站点标记 */}
      {MARKERS.map(id => {
        const sx = STATIONS[id].x / 100 * 1920;
        const passed = walkerPx >= sx - 4;
        const isCur = scene.id === id;
        return (
          <g key={id}>
            <circle cx={sx} cy={700} r={isCur ? 7 : 4.5}
              fill={passed ? C.seal : 'none'} stroke={passed ? C.seal : C.inkMute}
              strokeWidth="1.5" opacity={passed ? 0.85 : 0.4} />
            <text x={sx} y={736} textAnchor="middle"
              fontFamily={F.body} fontSize="15" letterSpacing="2"
              fill={isCur ? C.ink : C.inkMute}
              opacity={passed ? (isCur ? 1 : 0.55) : 0.3}
              style={{ fontWeight: isCur ? 600 : 400 }}>{STATIONS[id].place}</text>
          </g>
        );
      })}
      {/* 行者涟漪 */}
      {idx >= 1 && idx <= 6 && <>
        <circle cx={walkerPx} cy={wy} r={r1} fill="none" stroke={C.seal} strokeWidth="1.5" opacity={rop1} />
        <circle cx={walkerPx} cy={wy} r={r2} fill="none" stroke={C.seal} strokeWidth="1.5" opacity={rop2} />
        <circle cx={walkerPx} cy={wy} r="9" fill={C.seal} />
        <circle cx={walkerPx} cy={wy} r="9" fill="none" stroke={C.paper} strokeWidth="2.5" />
      </>}
    </svg>
  );
};

// 年份徽标：跟随行者，数字随站点跳动（呼应「时间不是线性的」）
const YearBadge = () => {
  const { time, scene } = useNarration();
  if (!scene) return null;
  const st = STATIONS[scene.id];
  if (!st.year) return null;
  const idx = SCENE_ORDER.indexOf(scene.id);
  const prevId = idx > 0 ? SCENE_ORDER[idx - 1] : scene.id;
  const from = STATIONS[prevId].x, to = st.x;
  const transitionDur = Math.min(2.4, scene.duration * 0.55);
  const t = expoOut(Math.min(1, Math.max(0, (time - scene.start) / transitionDur)));
  const xpct = lerp(from, to, t);
  const op = useSceneFade(scene.id, 0.6, 0.45);
  return (
    <div style={{ position: 'absolute', left: `${xpct}%`, top: 770, transform: 'translateX(-50%)', textAlign: 'center', opacity: op, pointerEvents: 'none' }}>
      <div style={{ fontFamily: F.mono, fontSize: 30, fontWeight: 500, color: C.seal, letterSpacing: '0.04em', lineHeight: 1 }}>{st.year}</div>
      <div style={{ fontFamily: F.body, fontSize: 14, color: C.inkMute, letterSpacing: '0.18em', marginTop: 6 }}>{st.era}</div>
    </div>
  );
};

// ════════════════ 字幕 (B站风 · 宣纸深墨) ════════════════
function visualLen(s) { let n = 0; for (const ch of s) n += /[a-zA-Z0-9 .,'":;\-]/.test(ch) ? 0.5 : 1; return n; }
function splitChunkToLines(text, maxLen = 13) {
  const lines = []; const sentences = []; let buf = '';
  for (const ch of text) { buf += ch; if ('。！？\n'.includes(ch)) { if (buf.trim()) sentences.push(buf.trim()); buf = ''; } }
  if (buf.trim()) sentences.push(buf.trim());
  for (const sent of sentences) {
    if (visualLen(sent) <= maxLen) { lines.push(sent); continue; }
    const parts = []; let pbuf = '';
    for (const ch of sent) { pbuf += ch; if ('，、；：'.includes(ch)) { parts.push(pbuf); pbuf = ''; } }
    if (pbuf) parts.push(pbuf);
    let merged = '';
    for (const p of parts) { if (visualLen(merged) + visualLen(p) <= maxLen) merged += p; else { if (merged) lines.push(merged); merged = p; } }
    if (merged) {
      if (visualLen(merged) <= maxLen) lines.push(merged);
      else { let hbuf = ''; for (const ch of merged) { hbuf += ch; if (visualLen(hbuf) >= maxLen) { lines.push(hbuf); hbuf = ''; } } if (hbuf) lines.push(hbuf); }
    }
  }
  return lines.filter(l => l.trim());
}
const Subtitles = () => {
  const { time, scene } = useNarration();
  if (!scene || !scene.chunks) return null;
  const active = scene.chunks.find(c => time >= c.absoluteStart && time < c.absoluteEnd);
  if (!active) return null;
  const lines = splitChunkToLines(active.text);
  if (lines.length === 0) return null;
  const totalLen = lines.reduce((s, l) => s + visualLen(l), 0);
  const chunkDur = active.absoluteEnd - active.absoluteStart;
  let acc = active.absoluteStart; let activeLine = lines[lines.length - 1]; let lineStart = active.absoluteStart;
  for (const line of lines) { const dur = (visualLen(line) / totalLen) * chunkDur; if (time < acc + dur) { activeLine = line; lineStart = acc; break; } acc += dur; }
  const lineProg = Math.min(1, (time - lineStart) / 0.15);
  return (
    <div style={{ position: 'absolute', left: 0, right: 0, bottom: 70, display: 'flex', justifyContent: 'center', pointerEvents: 'none', zIndex: 50 }}>
      <div key={lineStart} style={{
        fontFamily: '"PingFang SC", "Noto Sans SC", sans-serif', fontSize: 32, fontWeight: 500, color: C.ink,
        letterSpacing: '0.05em', lineHeight: 1.2, textAlign: 'center',
        textShadow: '0 0 6px rgba(241,232,214,0.95), 0 0 12px rgba(241,232,214,0.7), 0 1px 2px rgba(255,255,255,0.5)',
        opacity: lineProg, transform: `translateY(${(1 - lineProg) * 4}px)`,
      }}>{activeLine}</div>
    </div>
  );
};
